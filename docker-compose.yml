version: "3.9"

services:
  bot:
    build: .
    container_name: vpn_shop_bot
    restart: always
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8080:8080"
    volumes:
      - ./data:/app/data

  postgres:
    image: postgres:16-alpine
    container_name: vpn_shop_db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-vpn_bot}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-vpn_bot_secret}
      POSTGRES_DB: ${POSTGRES_DB:-vpn_shop}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-vpn_bot}"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: vpn_shop_redis
    restart: always
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
